<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאמת תלמידים — ט׳2 עם autocomplete</title>
<style>
  body { font-family: Arial, sans-serif; direction: rtl; padding:20px; max-width:900px; margin:auto; }
  h1{margin-top:0}
  textarea{width:100%; min-height:180px; padding:8px; font-size:16px; box-sizing:border-box; line-height:1.5; resize: vertical;}
  .results {margin-top:15px;}
  .miss {color:#b00;}
  .ok {color:green;}
  .autocomplete-suggestions {
    position: absolute;
    background: #fff;
    border: 1px solid #ccc;
    z-index: 9999;
    max-height: 160px;
    overflow-y: auto;
    width: 100%;
    box-sizing: border-box;
  }
  .autocomplete-suggestion { padding:6px 10px; cursor:pointer; }
  .autocomplete-suggestion:hover, .autocomplete-active { background:#f0f0f0; }
  .row-wrapper {position:relative;}
  button {margin:5px 3px; padding:8px 12px; font-size:14px; cursor:pointer;}
</style>
</head>
<body>

<h1>מאמת תלמידים — ט׳2 עם autocomplete</h1>
<p>הקלד שם בשורה חדשה, ההשלמה תציע שמות מהרשימה. בחירה משלימה ומוסיפה שורה אוטומטית.</p>

<div class="row-wrapper">
<textarea id="inputList" placeholder="הקלד שמות כאן, שורה לכל תלמיד"></textarea>
<div id="autocomplete" class="autocomplete-suggestions" style="display:none;"></div>
</div>

<div class="results" id="results"></div>

<button id="checkBtn">השווה לרשימת ט׳2</button>
<button id="clearBtn">נקה שדה</button>

<script>
// הרשימה הרשמית של ט׳2
let masterList = [
'אביה צונה',
'אגם חדידה',
'אדריאנה קלימוביצקי',
'אהרון בן ראובן',
'אורי פאר',
'אושר דוד פרנקו',
'איילה צונה',
'אליאל נגרי',
'אליה דוד דרורי',
'אליהו ישראל אברמוב',
'אלמוג יחזקאל',
'אלעד בנדלין',
'אמיר חן דניאל',
'אמיתי בוחבוט',
'אסף משה מונסונגו',
'גיא רביבו',
'דוד וויל סטרנין',
'יאיר ישראלי',
'יהלי שלום אבנר מועלם',
'יונתן שי באקר',
'ינון מלול',
'לביא שושלב',
'ליאן לוי',
'נעם אסרף',
'נועם בנימין',
'נתן מומיליאנו',
'עדי לוי',
'עומר מימוני',
'עידו דוד שיר',
'עידן שושני',
'פיליפ אקולוב',
'רפאל מור',
'שירה שוראקי'
];

// מיפוי שמות ידוע
const aliasMap = {
  'שוראקי פאולה':'שירה שוראקי',
  'שוראקי שירה':'שירה שוראקי'
};

// נורמליזציה
function normalize(name){ return name.replace(/\s+/g,' ').trim().toLowerCase(); }
function canonical(name){ return aliasMap[name]||name; }

// autocomplete
const textarea = document.getElementById('inputList');
const acDiv = document.getElementById('autocomplete');
let currentFocus = -1;

textarea.addEventListener('input', function(e){
  const val = getCurrentLine();
  if(!val) { acDiv.style.display='none'; return; }
  const suggestions = masterList.filter(n => normalize(canonical(n)).startsWith(normalize(val)));
  if(suggestions.length===0){ acDiv.style.display='none'; return; }
  acDiv.innerHTML = suggestions.map(n=>`<div class="autocomplete-suggestion">${n}</div>`).join('');
  acDiv.style.display='block';
  currentFocus=-1;
});

textarea.addEventListener('keydown', function(e){
  const items = acDiv.querySelectorAll('.autocomplete-suggestion');
  if(e.key==='ArrowDown'){ currentFocus=(currentFocus+1)%items.length; addActive(items); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ currentFocus=(currentFocus-1+items.length)%items.length; addActive(items); e.preventDefault(); }
  else if(e.key==='Enter'){ 
    if(currentFocus>-1){ e.preventDefault(); selectSuggestion(items[currentFocus]); }
    else{ insertNewLine(); }
  }
});

function getCurrentLine(){
  const pos = textarea.selectionStart;
  const lines = textarea.value.substr(0,pos).split('\n');
  return lines[lines.length-1];
}

function addActive(items){ 
  items.forEach(el=>el.classList.remove('autocomplete-active')); 
  if(items[currentFocus]) items[currentFocus].classList.add('autocomplete-active'); 
}

function selectSuggestion(el){
  const lines = textarea.value.split('\n');
  lines[lines.length-1] = el.textContent;
  textarea.value = lines.join('\n')+'\n';
  textarea.focus();
  acDiv.style.display='none';
}

// new line on Enter if no suggestion
function insertNewLine(){ 
  const pos = textarea.selectionStart;
  const val = textarea.value;
  textarea.value = val.slice(0,pos)+'\n'+val.slice(pos);
  textarea.selectionStart = textarea.selectionEnd = pos+1;
}

// קליק על הצעות
acDiv.addEventListener('click', e=>{
  if(e.target && e.target.classList.contains('autocomplete-suggestion')) selectSuggestion(e.target);
});

// נקה
document.getElementById('clearBtn').addEventListener('click',()=>{ textarea.value=''; document.getElementById('results').innerHTML=''; });

// השוואה
document.getElementById('checkBtn').addEventListener('click',()=>{
  const inputNames = textarea.value.split('\n').map(s=>s.trim()).filter(Boolean).map(n=>canonical(n));
  const missing = masterList.filter(n => !inputNames.includes(canonical(n)));
  const resDiv = document.getElementById('results');
  if(missing.length===0) resDiv.innerHTML='<div class="ok">כל השמות נמצאים ברשימה החדשה.</div>';
  else resDiv.innerHTML='<div class="miss">חסרים:\n• '+missing.join('<br>• ')+'</div>';
});
</script>
</body>
</html>
